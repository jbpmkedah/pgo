<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paparan PO3</title>
  <style>
    body {
   margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #017cba, #000001);
      color: white;
    }
    header {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background-color: rgba(0,0,0,0.8);
      color: white;
    }
    header img {
      width: 80px;
      height: 100px;
    }
    header h1 {
      margin-left: 20px;
      font-size: 24px;
    }
    .navbar {
      background-color: #ffffff88;
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .navbar a,
    .dropdown .dropbtn {
      font-size: 16px;
      color: black;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
    }
    .navbar a:hover,
    .dropdown:hover .dropbtn {
      background-color: #0191a7;
      color: white;
    }
    .dropdown {
      position: relative;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #0191a7;
      min-width: 200px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      border-radius: 6px;
      top: 100%;
      left: 0;
      z-index: 999;
    }
    .dropdown-content a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .dropdown-content a:hover {
      background-color: #01455c;
    }
    .dropdown:hover .dropdown-content {
      display: block;
    }
    main {
      padding: 20px;
    }
    select {
      padding: 8px;
      font-size: 16px;
      margin-bottom: 20px;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <header>
    <a href="jbpmkedah.html">
      <img src="media/logo.png" alt="Logo">
    </a>
    <h1>JABATAN BOMBA DAN PENYELAMAT MALAYSIA NEGERI KEDAH</h1>
  </header>

  <nav class="navbar">
    <a href="jbpmkedah.html">HALAMAN UTAMA</a>
    <div class="dropdown">
      <button class="dropbtn">PO3 ▾</button>
      <div class="dropdown-content">
        <a href="kekuatanpersonal.html">KEKUATAN PERSONEL</a>
        <a href="logistik.html">LOGISTIK</a>
        <a href="paparan.html">PAPARAN</a>
      </div>
    </div>
    <div class="dropdown">
      <button class="dropbtn">PGO ▾</button>
      <div class="dropdown-content">
        <a href="kemaskinipo3.html">KEMASKINI PO3</a>
        <a href="muatturun.html">MUAT TURUN</a>
        <a href="data.html">STATUS KEMASKINI</a>
      </div>
    </div>
    <a href="#">HUBUNGI</a>
  </nav>

  <main>
    <h2>PAPARAN LAPORAN PO3 MENGIKUT BALAI</h2>

    <label for="balaiSelect">Pilih Balai:</label>
    <select id="balaiSelect" onchange="paparSheet()">
      <option value="">-- Sila Pilih --</option>
      <option value="AST 01">BBP ALOR SETAR</option>
      <option value="LKW 02">BBP LANGKAWI</option>
      <option value="JTR 03">BBP JITRA</option>
      <option value="JRJ 04">BBP JALAN RAJA</option>
      <option value="GCK 05">BBP GUAR CEMPEDAK</option>
      <option value="SGP 06">BBP SUNGAI PETANI</option>
      <option value="BLG 07">BBP BALING</option>
      <option value="KLM 08">BBP KULIM</option>
      <option value="TBT 09">BBP TIKAM BATU</option>
      <option value="SIK 010">BBP SIK</option>
      <option value="KNG 011">BBP KUALA NERANG</option>
      <option value="BKH 012">BBP BUKIT KAYU HITAM</option>
      <option value="SDG 013">BBP SERDANG</option>
      <option value="KHT 014">BBP KULIM HITECH</option>
      <option value="LPP 015">BBP PERSIARAN PUTRA</option>
      <option value="YAN 016">BBP YAN</option>
      <option value="AMJ 017">BBP AMANJAYA</option>
      <option value="PDG 018">BBP PENDANG</option>
      <option value="PSN 019">BBP POKOK SENA</option>
      <option value="PMS 020">BBP PADANG MAT SIRAT</option>
    </select>

    <iframe id="paparanFrame" src=""></iframe>
  </main>

  <script>
    function paparSheet() {
      const balai = document.getElementById("balaiSelect").value;
      const baseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-GHEeToKnURaq8Y6hFTjz2YCaoXejgpyKc1gms_gphYaFiBKJG4Wq7EYx3Gt1b2b8OFHD5viV7k5Z/pubhtml?gid=";
      const sheetGids = {
        "AST 01": "39028904",
        "LKW 02": "64388133",
        "JTR 03": "1157657660",
        "JRJ 04": "1801270997",
        "GCK 05": "294011531",
        "SGP 06": "174785827",
        "BLG 07": "294160584",
        "KLM 08": "77370217",
        "TBT 09": "2031036487",
        "SIK 010": "1672893432",
        "KNG 011": "2112236777",
        "BKH 012": "647078472",
        "SDG 013": "2074542821",
        "KHT 014": "1914453329",
        "LPP 015": "440578451",
        "YAN 016": "62600375",
        "AMJ 017": "1849048273",
        "PDG 018": "1906034200",
        "PSN 019": "764179242",
        "PMS 020": "805590299"
      };

      if (balai && sheetGids[balai]) {
        document.getElementById("paparanFrame").src = baseUrl + sheetGids[balai] + "&single=true&widget=true&headers=false";
      } else {
        document.getElementById("paparanFrame").src = "";
      }
    }
  </script>
</body>
</html>
