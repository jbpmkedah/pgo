<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Kemaskini PO3</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #017cba, #000001);
      color: white;
    }
    header {
      display: flex;
      align-items: center;
      padding: 10px;
      background-color: rgba(0, 0, 0, 0.8);
    }
    header img {
      height: 80px;
      margin-right: 15px;
    }
    header h1 {
      font-size: 22px;
    }
    .navbar {
      background-color: #ffffff88;
      display: flex;
      flex-wrap: wrap;
      padding: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    .navbar a,
    .dropdown .dropbtn {
      font-size: 16px;
      color: black;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
    }
    .navbar a:hover,
    .dropdown:hover .dropbtn {
      background-color: #0191a7;
      color: white;
    }
    .dropdown {
      position: relative;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #0191a7;
      min-width: 200px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      top: 100%;
      left: 0;
      z-index: 999;
    }
    .dropdown-content a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .dropdown-content a:hover {
      background-color: #01455c;
    }
    .dropdown:hover .dropdown-content {
      display: block;
    }
    main {
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      background: white;
      color: black;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f2f2f2;
    }
    .lengkap {
      background-color: #c8f7c5;
    }
    .belum {
      background-color: #f7c5c5;
    }
    #summaryText {
      font-weight: bold;
      text-transform: uppercase;
      margin-top: 10px;
      text-align: center;
    }
    .summary-lengkap {
      color: #00ff00;
    }
    .summary-belum {
      color: #ff5555;
    }
    .clear-button, .zero-button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: red;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      display: block;
      margin: 30px auto 10px auto;
    }
    .zero-button {
      background-color: #007bff;
    }
  </style>
</head>
<body>
  <header>
    <img src="media/logo.png" alt="Logo">
    <h1>JABATAN BOMBA DAN PENYELAMAT MALAYSIA NEGERI KEDAH</h1>
  </header>
  <nav class="navbar">
    <a href="index.html">HALAMAN UTAMA</a>
    <div class="dropdown">
      <button class="dropbtn">PO3 ▾</button>
      <div class="dropdown-content">
        <a href="kekuatanpersonal.html">KEKUATAN PERSONEL</a>
        <a href="logistik.html">LOGISTIK</a>
        <a href="paparan.html">PAPARAN</a>
      </div>
    </div>
    <div class="dropdown">
      <button class="dropbtn">PGO ▾</button>
      <div class="dropdown-content">
        <a href="kemaskinipo3.html">KEMASKINI PO3</a>
        <a href="muatturun.html">MUAT TURUN</a>
        <a href="data.html">STATUS KEMASKINI</a>
      </div>
    </div>
    <a href="#">HUBUNGI</a>
    <div style="flex-grow:1;"></div>
    <button onclick="logout()" style="padding: 10px 20px; background-color: #910000; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;">Log Keluar</button>
  </nav>
  <main>
    <h2 style="text-align: center;">STATUS KEMASKINI PO3</h2>
    <p id="summaryText"></p>
    <table id="statusTable">
      <thead>
        <tr>
          <th>Kod Balai</th>
          <th>Kekuatan Personel</th>
          <th>Logistik</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button class="clear-button" onclick="clearLogSheet()">Kosongkan Data Log</button>
    <button class="zero-button" onclick="hantarSemuaDataKosong()">Hantar NILAI 0 ke Semua Balai</button>
  </main>
  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzZfg8G-jKdIr9Kb2yhX761fZjXmqlOlplX2Jcy6BysDZL-fED9EWfVwA7ZPJHUgiuzdA/exec";

    fetch(scriptURL)
      .then(response => response.json())
      .then(data => renderTable(data));

    function renderTable(data) {
      const balaiList = [
        "AST 01", "LKW 02", "JTR 03", "JRJ 04", "GCK 05",
        "SGP 06", "BLG 07", "KLM 08", "TBT 09", "SIK 010",
        "KNG 011", "BKH 012", "SDG 013", "KHT 014", "LPP 015",
        "YAN 016", "AMJ 017", "PDG 018", "PSN 019", "PMS 020"
      ];

      const statusMap = {};
      balaiList.forEach(balai => {
        statusMap[balai] = { personal: false, logistik: false };
      });

      data.forEach(row => {
        const balai = row.balai?.trim().toUpperCase();
        const borang = row.borang?.trim().toLowerCase();
        if (statusMap[balai]) {
          if (borang === "kekuatan personel") statusMap[balai].personal = true;
          if (borang === "logistik") statusMap[balai].logistik = true;
        }
      });

      let lengkapCount = 0;
      const tbody = document.querySelector("#statusTable tbody");
      tbody.innerHTML = "";

      balaiList.forEach(balai => {
        const status = statusMap[balai];
        const penuh = status.personal && status.logistik;
        if (penuh) lengkapCount++;
        const row = document.createElement("tr");
        row.className = penuh ? "lengkap" : "belum";
        row.innerHTML = `
          <td>${balai}</td>
          <td>${status.personal ? "✅" : "❌"}</td>
          <td>${status.logistik ? "✅" : "❌"}</td>
          <td>${penuh ? "Lengkap" : "Belum Lengkap"}</td>
        `;
        tbody.appendChild(row);
      });

      const percent = Math.round((lengkapCount / balaiList.length) * 100);
      const summary = document.getElementById("summaryText");
      summary.textContent = `Jumlah Balai Lengkap: ${lengkapCount} / ${balaiList.length} (${percent}%)`;
      summary.className = (percent === 100) ? "summary-lengkap" : "summary-belum";
    }

    function clearLogSheet() {
      if (confirm("Adakah anda pasti mahu kosongkan semua data dalam Log?")) {
        fetch(scriptURL + "?clearLog=true")
          .then(response => response.text())
          .then(data => {
            alert("Data Log telah dikosongkan.");
            location.reload();
          })
          .catch(error => {
            alert("Gagal kosongkan log: " + error);
          });
      }
    }

    async function hantarSemuaDataKosong() {
      const balaiList = [
        "AST 01", "LKW 02", "JTR 03", "JRJ 04", "GCK 05",
        "SGP 06", "BLG 07", "KLM 08", "TBT 09", "SIK 010",
        "KNG 011", "BKH 012", "SDG 013", "KHT 014", "LPP 015",
        "YAN 016", "AMJ 017", "PDG 018", "PSN 019", "PMS 020"
      ];

      const logistikPayload = {
        formType: "logistik",
        FRT1: 0, FRT0: 0, LFRT1: 0, LFRT0: 0,
        WT20L1: 0, WT20L0: 0, WT10L1: 0, WT10L0: 0,
        ALP1: 0, ALP0: 0, HPPM1: 0, HPPM0: 0,
        RIM1: 0, RIM0: 0, HAZMAT1: 0, HAZMAT0: 0,
        BATANDER1: 0, BATANDER0: 0, RRV1: 0, RRV0: 0
      };

      const personalPayload = {
        formType: "personal",
        MASA: "-", HINGGA: "-", TARIKH: new Date().toISOString().split("T")[0],
        KETUA_BALAI: "-", PENYELIA_PASUKAN: "-", PASUKAN: "-"
      };

      for (const balai of balaiList) {
        await fetch(scriptURL, {
          method: "POST",
          body: new URLSearchParams({ ...logistikPayload, sheetName: balai })
        });

        await fetch(scriptURL, {
          method: "POST",
          body: new URLSearchParams({ ...personalPayload, sheetName: balai })
        });
      }

      alert("Data nilai 0 berjaya dihantar ke semua balai.");
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
