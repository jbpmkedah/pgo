<script>
  async function hantarSemuaDataKosong() {
    const balaiList = [
      "AST 01", "LKW 02", "JTR 03", "JRJ 04", "GCK 05", "SGP 06", "BLG 07", "KLM 08", "TBT 09",
      "SIK 010", "KNG 011", "BKH 012", "SDG 013", "KHT 014", "LPP 015", "YAN 016", "AMJ 017", "PDG 018", "PSN 019", "PMS 020"
    ];

    const url = "https://script.google.com/macros/s/YOUR_DEPLOYED_SCRIPT_URL/exec"; // 🔁 Ganti URL ini

    const logistikPayload = {
      formType: "logistik",
      FRT1: 0, FRT0: 0,
      LFRT1: 0, LFRT0: 0,
      WT20L1: 0, WT20L0: 0,
      WT10L1: 0, WT10L0: 0,
      ALP1: 0, ALP0: 0,
      HPPM1: 0, HPPM0: 0,
      RIM1: 0, RIM0: 0,
      HAZMAT1: 0, HAZMAT0: 0,
      BATANDER1: 0, BATANDER0: 0,
      RRV1: 0, RRV0: 0
    };

    const personalPayload = {
      formType: "personal",
      MASA: "-", HINGGA: "-", TARIKH: new Date().toISOString().split("T")[0],
      KETUA_BALAI: "-", PENYELIA_PASUKAN: "-", PASUKAN: "-"
    };

    for (const balai of balaiList) {
      // Logistik
      let data1 = new URLSearchParams({ ...logistikPayload, sheetName: balai });
      await fetch(url, { method: "POST", body: data1 });

      // Personal
      let data2 = new URLSearchParams({ ...personalPayload, sheetName: balai });
      await fetch(url, { method: "POST", body: data2 });

      console.log(`Data kosong dihantar ke ${balai}`);
    }

    alert("Data nilai 0 berjaya dihantar ke semua balai.");
  }
</script>
