<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu dengan Submenu Warna Menarik</title>
  <br>
<div style="display: flex; align-items: center; padding: 10px 20px;">
    <a href="jbpmkedah.html">
      <img src="media/logo.png" alt="Logo" width="80px" height="100">
    </a>
    <h1 style="margin-left: 20px; color: white; font-size: 40px;">
      JABATAN BOMBA DAN PENYELAMAT MALAYSIA NEGERI KEDAH
    </h1>

  <style>
    body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(to right, #017cba, #000001);
  color: white;
}

.wrapper {
  max-width: 1200px;
  margin: 20px auto;
  padding: 0 20px;
}

.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 28px;
  margin: 0;
  color: white;
}

.navbar {
  background-color: #ffffff44;
  overflow: hidden;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  margin-bottom: 20px;
}

.navbar a, .dropdown .dropbtn {
  float: left;
  font-size: 16px;
  color: white;
  padding: 14px 20px;
  text-decoration: none;
  transition: background 0.3s ease;
}

.navbar a:hover, .dropdown:hover .dropbtn {
  background-color: #0191a7;
}

.dropdown {
  float: left;
  overflow: hidden;
}

.dropdown-content {
  display: none;
  position: absolute;
  background: #0191a7;
  min-width: 200px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  border-radius: 6px;
  z-index: 1;
}

.dropdown-content a {
  float: none;
  color: white;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.dropdown-content a:hover {
  background-color: #01455c;
}

.dropdown:hover .dropdown-content {
  display: block;
}

form {
  margin-top: 20px;
}

label, select, input[type="text"], input[type="date"] {
  margin: 5px 10px;
  padding: 6px;
  font-size: 14px;
  border-radius: 4px;
  border: 1px solid #ccc;
}

input[type="text"] {
  width: 40px;
}

table {
  width: 100%;
  overflow-x: auto;
  border-collapse: collapse;
  margin-top: 20px;
}

table th, table td {
  padding: 6px;
  text-align: center;
  font-size: 13px;
}

button {
  margin-top: 20px;
  padding: 10px 30px;
  background-color: #017cba;
  border: none;
  color: white;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #01497c;
}

@media (max-width: 768px) {
  .header {
    flex-direction: column;
    text-align: center;
  }

  .navbar a, .dropdown .dropbtn {
    float: none;
    display: block;
    text-align: left;
  }
}

  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Header -->
    <div class="header">
      <a href="jbpmkedah.html">
        <img src="media/logo.png" alt="Logo" width="80" height="100" />
      </a>
      <h1>JABATAN BOMBA DAN PENYELAMAT MALAYSIA NEGERI KEDAH</h1>
    </div>

    <!-- Navbar -->
    <div class="navbar">
      <a href="#">HALAMAN UTAMA</a>
      <div class="dropdown">
        <button class="dropbtn">PO3 ▾</button>
        <div class="dropdown-content">
          <a href="#">BORANG PO3</a>
          <a href="#">PAPARAN PO3</a>
        </div>
      </div>
      <div class="dropdown">
        <button class="dropbtn">PENDAFTARAN ▾</button>
        <div class="dropdown-content">
        <a href="kemaskinipo3.html">KEMASKINI PO3</a>
        <a href="muatturun.html">MUAT TURUN</a>
        <a href="data.html">STATUS KEMASKINI</a>
      </div>
      </div>
      <a href="#">HUBUNGI</a>
    </div>

</body>
</html>
